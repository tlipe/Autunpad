<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Layout</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100vh;overflow:hidden}
    body{font-family:'JetBrains Mono',monospace;background:#0a0a0a;color:#e0e0e0;display:grid;grid-template-rows:36px 1fr 180px 24px;grid-template-columns:1fr}
    
    .toolbar{display:flex;background:#111;border-bottom:1px solid #2a2a2a;min-width:0}
    .toolbar-content{flex:1;background:#222}
    
    .main-area{display:flex;min-height:0;overflow:hidden;background:#1a1a1a}
    .sidebar{width:240px;background:#111;border-right:1px solid #2a2a2a;flex-shrink:0}
    .editor{flex:1;background:#0a0a0a;display:flex;align-items:center;justify-content:center;color:#808080;min-width:0}
    
    .terminal-panel{display:flex;min-height:0;overflow:hidden;background:#0d0d0d;border-top:1px solid #2a2a2a}
    .term-list{width:180px;background:#111;border-right:1px solid #2a2a2a;flex-shrink:0}
    .term-main{flex:1;display:flex;flex-direction:column;min-width:0}
    .term-toolbar{padding:10px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;flex-shrink:0}
    .term-output{flex:1;padding:10px;overflow-y:auto;min-height:0}
    
    .status-bar{background:#111;border-top:1px solid #2a2a2a;display:flex;align-items:center;padding:0 12px;font-size:12px;color:#808080;min-width:0}
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-content">Toolbar (36px)</div>
  </div>
  
  <div class="main-area">
    <div class="sidebar">Sidebar (240px)</div>
    <div class="editor">Editor Area</div>
  </div>
  
  <div class="terminal-panel">
    <div class="term-list">Terminais</div>
    <div class="term-main">
      <div class="term-toolbar">Terminal Toolbar</div>
      <div class="term-output">Output do terminal</div>
    </div>
  </div>
  
  <div class="status-bar">
    <span>Status Bar (24px)</span>
  </div>
</body>
</html>
