<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Autunpad</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'JetBrains Mono',monospace;background:#0a0a0a;color:#e0e0e0;overflow:hidden;height:100vh;display:flex;flex-direction:column}
    .bg-surface{background:#111}.bg-hover{background:#1a1a1a}.bg-active{background:#222}.border-color{border-color:#2a2a2a}
    .text-muted{color:#808080}.text-accent{color:#0078d4}
    button{cursor:pointer;background:none;border:none;color:inherit;font:inherit}
    button:disabled{opacity:.3;cursor:not-allowed}
    .tab-el{cursor:pointer;display:flex;align-items:center;gap:8px;padding:0 14px;font-size:12px;white-space:nowrap;flex-shrink:0;height:100%;transition:all .3s cubic-bezier(0.4, 0, 0.2, 1);color:#808080}
    .tab-el.tab-active{background:#222;border-bottom:2px solid #0078d4;color:#e0e0e0}
    .tab-el.tab-inactive{border-bottom:2px solid transparent}
    .tab-el.tab-inactive:hover{background:#1a1a1a;color:#e0e0e0}
    .tab-el[draggable="true"]{cursor:grab}
    .tab-el.dragging{opacity:.4;cursor:grabbing}
    .tab-el.drag-over-left{box-shadow:inset 3px 0 0 #0078d4}
    .tab-el.drag-over-right{box-shadow:inset -3px 0 0 #0078d4}
    .tab-el .tab-name{cursor:text}
    .tab-el .tab-folder{color:#808080;transition:all .3s;margin-left:4px;opacity:0;width:16px;height:16px;display:flex;align-items:center;justify-content:center}
    .tab-el:hover .tab-folder{opacity:.6}
    .tab-el .tab-folder:hover{opacity:1!important;transform:scale(1.1)}
    .tab-el .tab-close{font-size:14px;cursor:pointer;margin-left:4px;opacity:0;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:3px;transition:all .2s}
    .tab-el:hover .tab-close{opacity:.6}
    .tab-el .tab-close:hover{opacity:1!important;background:#ff5555;color:#fff;transform:scale(1.15)}
    .editor-wrapper{position:relative;flex:1;overflow:hidden}
    #editor{resize:none;font:14px/24px 'JetBrains Mono',monospace;width:100%;height:100%;background:transparent;color:#e0e0e0;border:none;padding:16px;outline:none;tab-size:4;position:relative;z-index:2;caret-color:#e0e0e0}
    #highlight-layer{position:absolute;top:0;left:0;right:0;bottom:0;font:14px/24px 'JetBrains Mono',monospace;padding:16px;color:#e0e0e0;white-space:pre-wrap;overflow:hidden;pointer-events:none;z-index:1;background:#0a0a0a;tab-size:4}
    #line-numbers{font:14px/24px 'JetBrains Mono',monospace;text-align:right;padding:16px 3px;color:#4a4a4a;user-select:none;white-space:pre;overflow:hidden;height:100%;flex-shrink:0}
    .scrollbar-thin::-webkit-scrollbar{width:8px;height:8px}
    .scrollbar-thin::-webkit-scrollbar-track{background:#111}
    .scrollbar-thin::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px;transition:background .2s}
    .scrollbar-thin::-webkit-scrollbar-thumb:hover{background:#3a3a3a}
    #tabs-container{scroll-behavior:smooth;transition:scroll .3s ease}
    .fade-in{animation:fadeIn .3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-2px)}to{opacity:1;transform:translateY(0)}}
    .rename-input{background:#222;color:#e0e0e0;font:11px 'JetBrains Mono',monospace;padding:0 4px;border:1px solid #0078d4;border-radius:2px;outline:none;width:140px;height:20px}
    #sidebar{position:relative;transition:width .1s ease}
    #resize-handle{position:absolute;right:0;top:0;bottom:0;width:4px;background:transparent;cursor:col-resize;z-index:10;transition:background .2s}
    #resize-handle:hover,#resize-handle.active{background:#0078d4}
    .toolbar-btn{padding:6px;border-radius:4px;color:#808080;transition:all .15s;display:flex;align-items:center;justify-content:center}
    .toolbar-btn:hover:not(:disabled){background:#1a1a1a;color:#e0e0e0}
    .toolbar-btn:disabled{opacity:.3;cursor:not-allowed}
    .settings-menu{position:absolute;right:0;top:100%;background:#111;border:1px solid #2a2a2a;border-radius:4px;padding:4px 0;min-width:160px;box-shadow:0 4px 12px rgba(0,0,0,.5);z-index:1000;opacity:0;visibility:hidden;transition:all .2s ease;transform:translateY(-8px)}
    .settings-menu.show{opacity:1;visibility:visible;transform:translateY(0)}
    .settings-item{padding:8px 12px;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:8px;font-size:12px}
    .settings-item:hover{background:#1a1a1a}
    .settings-item svg{width:14px;height:14px}
    .hl-keyword{color:#c678dd}
    .hl-string{color:#98c379}
    .hl-number{color:#d19a66}
    .hl-comment{color:#5c6370;font-style:italic}
    .hl-function{color:#61afef}
    .hl-variable{color:#e06c75}
    .hl-operator{color:#56b6c2}
    .hl-property{color:#e5c07b}
    #find-replace{display:none;background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:8px 12px;gap:8px;align-items:center;font-size:12px}
    #find-replace.show{display:flex}
    #find-replace input{background:#111;border:1px solid #2a2a2a;color:#e0e0e0;padding:4px 8px;font:12px 'JetBrains Mono',monospace;border-radius:3px;outline:none;width:180px}
    #find-replace input:focus{border-color:#0078d4}
    #find-replace button{padding:4px 8px;background:#222;border:1px solid #2a2a2a;color:#e0e0e0;border-radius:3px;font-size:11px;transition:all .15s}
    #find-replace button:hover{background:#2a2a2a}
    .saved-indicator{opacity:0;transition:opacity .3s;color:#0078d4;font-weight:600}
    .saved-indicator.show{opacity:1}
  </style>
</head>
<body>
  <div style="display:flex;height:36px;background:#111;border-bottom:1px solid #2a2a2a;user-select:none">
    <div id="tabs-container" style="flex:1;overflow-x:auto;display:flex" class="scrollbar-thin"></div>
    <div style="width:1px;height:20px;background:#2a2a2a;margin:auto 4px"></div>
    <div style="display:flex;gap:2px;align-items:center;padding:0 8px">
      <button onclick="undo()" class="toolbar-btn" title="Desfazer (Ctrl+Z)">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
      </button>
      <button onclick="redo()" class="toolbar-btn" title="Refazer (Ctrl+Y)">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 10H11a8 8 0 00-8 8v2m18-10l-6 6m6-6l-6-6"/></svg>
      </button>
      <div style="width:1px;height:16px;background:#2a2a2a;margin:0 4px"></div>
      <button onclick="cutText()" class="toolbar-btn" title="Recortar (Ctrl+X)">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.121 14.121L19 19m-7-7l7-7m-7 7l-2.879 2.879M12 12L9.121 9.121m0 5.758a3 3 0 10-4.243 4.243 3 3 0 004.243-4.243zm0-5.758a3 3 0 10-4.243-4.243 3 3 0 004.243 4.243z"/></svg>
      </button>
      <button onclick="copyText()" class="toolbar-btn" title="Copiar (Ctrl+C)">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
      </button>
      <button onclick="pasteText()" class="toolbar-btn" title="Colar (Ctrl+V)">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      </button>
      <div style="width:1px;height:16px;background:#2a2a2a;margin:0 4px"></div>
      <button id="exec-btn" onclick="executeCurrent()" disabled class="toolbar-btn" title="Executar">
        <svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/></svg>
      </button>
      <button id="stop-btn" onclick="stopExecution()" class="toolbar-btn" title="Parar" style="display:none">
        <svg width="14" height="14" fill="#ff5555" viewBox="0 0 20 20"><rect x="4" y="4" width="12" height="12" rx="1"/></svg>
      </button>
      <div style="width:1px;height:16px;background:#2a2a2a;margin:0 4px"></div>
      <div style="position:relative">
        <button onclick="toggleHistory()" class="toolbar-btn" title="Histórico">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </button>
        <div id="history-menu" class="settings-menu"></div>
      </div>
      <div style="position:relative">
        <button onclick="toggleSettings()" class="toolbar-btn" title="Configurações">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
        <div id="settings-menu" class="settings-menu">
          <div class="settings-item" onclick="toggleLineNumbers()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"/></svg>
            <span>Números de linha</span>
          </div>
          <div class="settings-item" onclick="toggleWordWrap()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
            <span>Quebra de linha</span>
          </div>
          <div class="settings-item" onclick="changeFontSize()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
            <span>Tamanho da fonte</span>
          </div>
          <div class="settings-item" onclick="toggleHighlighting()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
            <span>Destacar sintaxe</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="find-replace">
    <input id="find-input" type="text" placeholder="Buscar...">
    <input id="replace-input" type="text" placeholder="Substituir...">
    <button onclick="findNext()">Buscar</button>
    <button onclick="replaceNext()">Substituir</button>
    <button onclick="replaceAll()">Substituir Tudo</button>
    <button onclick="toggleFindReplace()" style="margin-left:auto;opacity:.6">✕</button>
  </div>

  <div style="display:flex;height:calc(100vh - 36px - 24px)">
    <div id="sidebar" style="width:240px;background:#111;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;overflow:hidden;position:relative">
      <div style="padding:8px 12px;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:11px;font-weight:600;text-transform:uppercase;color:#808080">Explorer</span>
        <div style="display:flex;gap:4px">
          <button onclick="pickGlobalSaveFolder()" class="toolbar-btn" title="Definir pasta de salvamento">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
          </button>
          <button onclick="openFolder()" class="toolbar-btn" title="Abrir pasta">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
          </button>
        </div>
      </div>
      <div id="save-folder-display"></div>
      <div id="file-list" style="flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:4px" class="scrollbar-thin">
        <div style="font-size:12px;color:#808080;text-align:center;padding:32px 0">Nenhuma pasta aberta</div>
      </div>
      <div id="resize-handle"></div>
    </div>

    <div style="flex:1;display:flex;overflow:hidden">
      <div id="line-numbers" style="width:22px;background:#0a0a0a;border-right:1px solid #2a2a2a;font-size:14px;overflow:hidden;height:100%">1</div>
      <div class="editor-wrapper">
        <div id="highlight-layer"></div>
        <textarea id="editor" placeholder="Comece a digitar..." class="scrollbar-thin"></textarea>
      </div>
    </div>
  </div>

  <div id="output-panel" style="height:144px;background:#111;border-top:1px solid #2a2a2a;display:none;flex-direction:column">
    <div style="padding:8px 12px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;font-weight:600">Saída</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="clearOutput()" title="Limpar" style="color:#808080;transition:all .15s;padding:2px">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
        <button onclick="toggleOutput()" title="Fechar" style="color:#808080;transition:all .15s">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div id="output-content" style="flex:1;padding:12px;overflow-y:auto;font-size:12px;line-height:1.5;white-space:pre-wrap" class="scrollbar-thin"></div>
  </div>

  <div style="height:24px;background:#111;border-top:1px solid #2a2a2a;display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-size:12px;color:#808080">
    <span id="status-message">Pronto</span>
    <div style="display:flex;gap:16px">
      <span id="saved-indicator" class="saved-indicator">Salvo</span>
      <span id="word-count">0 palavras</span>
      <span id="char-count">0 chars</span>
      <span id="status-info">Ln 1</span>
      <span id="file-type"></span>
    </div>
  </div>

  <script>
    // Estado da aplicação
    let tauriReady = false;
    let invoke = null;
    let pythonAvailable = null;
    let tabs = [], activeTabId = null, saveFolder = null, dedicatedFolder = null;

    class Tab{
      constructor(id, title, content='', path=null, format='plaintext', isExecutable=false, runtimeAvailable=true) {
        this.id = id;
        this.title = title;
        this.content = content;
        this.path = path;
        this.format = format;
        this.isExecutable = isExecutable;
        this.runtimeAvailable = runtimeAvailable;
        this.dirty = false;
        this.originalTitle = title;
        this.originalContent = content;
        this.originalFormat = format;
      }
      
      hasRealChanges() {
        const hasContent = this.content && this.content.trim().length > 0;
        const titleChanged = this.title !== this.originalTitle;
        const contentChanged = this.content !== this.originalContent;
        const formatChanged = this.format !== this.originalFormat;
        
        return (hasContent && contentChanged) || titleChanged || formatChanged;
      }
    }

    // Função auxiliar para verificar se Tauri está pronto
    function requireTauri() {
      if (!tauriReady || !invoke) {
        setStatus('Aguardando inicialização...');
        return false;
      }
      return true;
    }

    async function updateTabMetadataFromTitle(tab) {
      if (!tab) return;
      const ext = tab.title.split('.').pop().toLowerCase();
      const formatMap = {md:'markdown',markdown:'markdown',rtf:'richtext',ps1:'script',bat:'script',cmd:'script',sh:'script',py:'script',exe:'script',json:'json',js:'plaintext',c:'plaintext',rs:'plaintext'};
      tab.format = formatMap[ext] || 'plaintext';
      tab.isExecutable = ['ps1','bat','cmd','sh','py','exe'].includes(ext);
      if (ext === 'py') {
        if (pythonAvailable === null && tauriReady) {
          try {
            const runtimes = await invoke('check_runtimes');
            pythonAvailable = runtimes.python;
          } catch(e) { pythonAvailable = false; }
        }
        tab.runtimeAvailable = pythonAvailable === true;
      } else {
        tab.runtimeAvailable = tab.isExecutable;
      }
    }

    function newTab(){const id=Date.now(),tab=new Tab(id,'Sem Nome.txt'),idx=tabs.findIndex(t=>t.id===activeTabId);idx>=0?tabs.splice(idx+1,0,tab):tabs.push(tab);activeTabId=id;renderTabs();loadTabContent()}

    async function openFile(){if(!requireTauri())return;try{const r=await invoke('open_file');if(r){const id=Date.now(),tab=new Tab(id,r.title,r.content,r.path,r.format,r.is_executable,r.runtime_available);await updateTabMetadataFromTitle(tab);tabs.push(tab);activeTabId=id;renderTabs();loadTabContent();setStatus('Arquivo aberto')}}catch(e){setStatus('Erro: '+e)}}

    async function saveFile(){if(!requireTauri())return;const tab=getActiveTab();if(!tab)return;try{let savePath=tab.path||undefined;if(savePath&&tab.title!==tab.originalTitle){const dir=savePath.substring(0,savePath.lastIndexOf('\\')>0?savePath.lastIndexOf('\\')+1:savePath.lastIndexOf('/')+1);savePath=dir+tab.title;tab.path=null}const r=await invoke('save_file',{path:savePath,suggestedName:tab.title,content:tab.content});if(r){tab.path=r.path;tab.title=r.title;tab.format=r.format;tab.isExecutable=r.is_executable;tab.runtimeAvailable=r.runtime_available;tab.dirty=false;tab.originalTitle=tab.title;tab.originalContent=tab.content;tab.originalFormat=tab.format;await updateTabMetadataFromTitle(tab);saveToHistory(tab.title,tab.content);renderTabs();updateToolbar();updateFileType();updateHighlighting();const editor=document.getElementById('editor');const hl=document.getElementById('highlight-layer');if(editor&&hl){hl.scrollTop=editor.scrollTop;editor.scrollTop=hl.scrollTop}setStatus('Arquivo salvo')}}catch(e){if(e!=='Cancelado')setStatus('Erro: '+e)}}


    // Histórico/Cache system
    function saveToHistory(title,content){if(!content||!content.trim())return;const history=JSON.parse(localStorage.getItem('autunpad-history')||'[]');const entry={title,content,timestamp:Date.now()};history.unshift(entry);if(history.length>5)history.pop();localStorage.setItem('autunpad-history',JSON.stringify(history))}
    
    function toggleHistory(){const menu=document.getElementById('history-menu');if(!menu)return;menu.classList.toggle('show');if(menu.classList.contains('show')){const history=JSON.parse(localStorage.getItem('autunpad-history')||'[]');const items=history.map((h,i)=>{const date=new Date(h.timestamp).toLocaleString('pt-BR');return '<div class="settings-item" onclick="loadFromHistory('+i+')"><div><div style="font-weight:600">'+h.title+'</div><div style="font-size:10px;color:#808080">'+date+'</div></div></div>'}).join('');const clearBtn='<div class="settings-item" onclick="clearHistory()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg><span>Limpar histórico</span></div>';menu.innerHTML=items+(items?clearBtn:'<div class="settings-item" style="color:#808080">Histórico vazio</div>')}}
    
    function loadFromHistory(index){const history=JSON.parse(localStorage.getItem('autunpad-history')||'[]');const entry=history[index];if(!entry)return;const id=Date.now(),tab=new Tab(id,entry.title,entry.content);tabs.push(tab);activeTabId=id;renderTabs();loadTabContent();document.getElementById('history-menu').classList.remove('show');setStatus('Texto carregado do histórico')}
    
    function clearHistory(){localStorage.removeItem('autunpad-history');document.getElementById('history-menu').classList.remove('show');setStatus('Histórico limpo')}

    function updateHighlighting(){const editor=document.getElementById('editor');const highlightLayer=document.getElementById('highlight-layer');if(!editor||!highlightLayer||!settings.highlighting)return;const tab=getActiveTab();if(!tab)return;const lang=tab.format==='markdown'?'markdown':tab.format==='script'?detectLanguage(tab.path||tab.title):tab.format==='json'?'json':'plaintext';if(lang==='plaintext'){editor.style.color='#e0e0e0';highlightLayer.style.display='none';return}const highlighted=highlightCode(editor.value,lang);highlightLayer.innerHTML=highlighted+'<br>';editor.style.color='transparent';editor.style.textShadow='none';highlightLayer.style.display='block';highlightLayer.scrollTop=editor.scrollTop}

    function detectLanguage(pathOrTitle){const ext=(pathOrTitle||'').split('.').pop().toLowerCase();const map={js:'javascript',py:'python',md:'markdown',json:'json',c:'c',h:'c',cpp:'c',rs:'rust',ps1:'powershell',bat:'batch',cmd:'batch',sh:'bash'};return map[ext]||'plaintext'}

    function updateToolbar(){const tab=getActiveTab(),can=tab&&tab.isExecutable&&tab.runtimeAvailable,btn=document.getElementById('exec-btn');btn.disabled=!can||!tauriReady;btn.title=!tauriReady?'Aguardando inicialização...':tab&&tab.isExecutable&&!tab.runtimeAvailable?'Runtime não disponível':can?'Executar':'Arquivo não executável'}

    function updateFileType(){const tab=getActiveTab();if(!tab)return;const f={markdown:'Markdown',plaintext:'Texto',richtext:'RTF',script:tab.runtimeAvailable?'Script':'Script (sem runtime)'};document.getElementById('file-type').textContent=f[tab.format]||'Texto'}

    function setStatus(msg){document.getElementById('status-message').textContent=msg}

    let statusTimeout;function updateStatusInfo(){clearTimeout(statusTimeout);statusTimeout=setTimeout(()=>{const tab=getActiveTab();if(!tab)return;const ed=document.getElementById('editor'),line=ed.value.slice(0,ed.selectionStart).split('\n').length;document.getElementById('status-info').textContent='Ln '+line},50)}

    const editor=document.getElementById('editor');
    editor.addEventListener('input',e=>{const tab=getActiveTab();if(tab){tab.content=e.target.value;tab.dirty=true;renderTabs();updateLineNumbers();updateHighlighting();updateWordCount()}});
    editor.addEventListener('keyup',()=>{updateLineNumbers();updateStatusInfo()});
    editor.addEventListener('click',updateStatusInfo);
    editor.addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();const s=editor.selectionStart,en=editor.selectionEnd,v=editor.value;if(e.shiftKey){const lineStart=v.lastIndexOf('\n',s-1)+1;const lineText=v.substring(lineStart,en);const stripped=lineText.replace(/^( {1,4}|\t)/gm,'');const diff=lineText.length-stripped.length;editor.value=v.substring(0,lineStart)+stripped+v.substring(en);editor.selectionStart=Math.max(lineStart,s-Math.min(diff,4));editor.selectionEnd=en-diff}else if(s!==en){const lineStart=v.lastIndexOf('\n',s-1)+1;const lineText=v.substring(lineStart,en);const indented=lineText.replace(/^/gm,'    ');const diff=indented.length-lineText.length;editor.value=v.substring(0,lineStart)+indented+v.substring(en);editor.selectionStart=lineStart;editor.selectionEnd=en+diff}else{editor.value=v.substring(0,s)+'    '+v.substring(en);editor.selectionStart=editor.selectionEnd=s+4}editor.dispatchEvent(new Event('input'))}});
    editor.addEventListener('scroll',()=>{const ln=document.getElementById('line-numbers');const hl=document.getElementById('highlight-layer');if(ln)ln.scrollTop=editor.scrollTop;if(hl)hl.scrollTop=editor.scrollTop});

    document.addEventListener('keydown',e=>{if(e.ctrlKey){if(e.key==='n'){e.preventDefault();newTab()}else if(e.key==='o'){e.preventDefault();openFile()}else if(e.key==='s'){e.preventDefault();saveFile()}else if(e.key==='h'){e.preventDefault();openFindReplace()}else if(e.key==='F5'){e.preventDefault();executeCurrent()}}});

    // Sidebar resize
    const resizeHandle=document.getElementById('resize-handle');
    const sidebar=document.getElementById('sidebar');
    let isResizing=false;
    
    resizeHandle.addEventListener('mousedown',e=>{isResizing=true;resizeHandle.classList.add('active');document.body.style.cursor='col-resize';document.body.style.userSelect='none'});
    document.addEventListener('mousemove',e=>{if(!isResizing)return;const newWidth=Math.max(150,Math.min(500,e.clientX));sidebar.style.width=newWidth+'px'});
    document.addEventListener('mouseup',()=>{if(isResizing){isResizing=false;resizeHandle.classList.remove('active');document.body.style.cursor='';document.body.style.userSelect='';try{localStorage.setItem('autunpad-sidebar-width',sidebar.style.width)}catch(e){}}});

    // Criar aba padrão imediatamente (não precisa do Tauri)
    newTab();
    updateLineNumbers();
    setStatus('Aguardando inicialização...');
    
    // Carregar e aplicar configurações
    loadSettings();
    applySettings();
    
    // Carregar largura do sidebar
    try{const savedWidth=localStorage.getItem('autunpad-sidebar-width');if(savedWidth)sidebar.style.width=savedWidth}catch(e){}

    // Aguardar Tauri inicializar com polling
    let tauriCheckAttempts = 0;
    const maxAttempts = 50; // 5 segundos máximo
    
    function checkTauri() {
        if (window.__TAURI__ && window.__TAURI__.core) {
            invoke = window.__TAURI__.core.invoke;
            tauriReady = true;
            console.log('Tauri inicializado com sucesso');
            setStatus('Pronto');
            updateToolbar();
            invoke('check_runtimes').then(runtimes => {
                pythonAvailable = runtimes.python;
                console.log('Python disponível:', pythonAvailable);
            }).catch(e => {
                pythonAvailable = false;
            });
        } else if (tauriCheckAttempts < maxAttempts) {
            tauriCheckAttempts++;
            setTimeout(checkTauri, 100);
        } else {
            console.error('Falha ao inicializar Tauri após', maxAttempts, 'tentativas');
            setStatus('Erro: Tauri não inicializado');
        }
    }
    
    checkTauri();

    // Atualizar estado de dirty no backend para controle de fechamento
    function updateDirtyState() {
      const hasChanges = tabs.some(t => t.hasRealChanges());
      if (tauriReady && invoke) {
        invoke('set_dirty_state', { dirty: hasChanges }).catch(() => {});
      }
    }
    
    // Chamar updateDirtyState sempre que tabs mudam
    const originalRenderTabs = renderTabs;
    renderTabs = function() {
      originalRenderTabs();
      updateDirtyState();
    };
  </script>
